<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f2f4f5",
                        "tertiary-fixed": "#9ff2e0",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#576670",
                        "on-primary-fixed": "#001f2a",
                        "secondary-container": "#d5e5f1",
                        "secondary-fixed-dim": "#b9c9d4",
                        "secondary": "#51606a",
                        "outline-variant": "#bfc8cd",
                        "tertiary-fixed-dim": "#83d6c4",
                        "on-secondary-fixed": "#0e1d26",
                        "primary-fixed": "#bee9ff",
                        "outline": "#70787e",
                        "tertiary-container": "#006a5c",
                        "tertiary": "#005045",
                        "primary-container": "#006684",
                        "background": "#f8fafb",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#3f484d",
                        "inverse-on-surface": "#eff1f2",
                        "surface-tint": "#016684",
                        "surface-dim": "#d8dadb",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary-fixed-variant": "#004d64",
                        "on-tertiary-fixed-variant": "#005046",
                        "surface-bright": "#f8fafb",
                        "on-secondary-fixed-variant": "#3a4952",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-error": "#ffffff",
                        "surface": "#f8fafb",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#d5e5f1",
                        "on-background": "#191c1d",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "on-tertiary-container": "#94e7d5",
                        "surface-container": "#eceeef",
                        "primary": "#004d64",
                        "inverse-primary": "#87d0f2",
                        "surface-container-high": "#e6e8e9",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#87d0f2",
                        "on-primary-container": "#a2e1ff",
                        "on-tertiary-fixed": "#00201b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        .brand-font {
            font-family: 'Manrope', sans-serif;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen pb-24">
    <!-- TopAppBar -->
    <header
        class="w-full top-0 z-50 sticky bg-[#f8fafb] dark:bg-slate-900 flex items-center justify-between px-6 py-4 w-full">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-[#004d64] dark:text-[#bee9ff]" data-icon="menu">menu</span>
            <span class="font-['Manrope'] font-extrabold text-xl text-[#004d64] dark:text-[#bee9ff]">ReceiptSnap</span>
        </div>
        <div class="h-10 w-10 rounded-full overflow-hidden bg-surface-container-highest">
            <img alt="Profile" class="w-full h-full object-cover"
                data-alt="Close-up professional portrait of a business person in a bright modern office setting with soft natural light"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrdEyFvSB-La3T_p2yQRP44A4X39WrRUmQjDq2dBb4WoOJlpF9VFJqwNNPVsMWyEfaEnAgtM2K3KDUGV239CPRCn03sM-KB17gcH4GHp8M6VK7WAwvxsSwaW9TDF9mmrLn504MK6Q_VS_sgbI-K32dxNN4V4mBduD-Iuu24xsgUsn5VGJMiBKUj7Pj5c1YsBSPzR9FqGVYyNTet5LrPf6a7yccTcHKADl2nGC8kVpj_EpRnLd_0PEb36hbjZH-72IT5ZHmONl_ctO2" />
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Progress & Navigation Header -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
            <div>
                <span
                    class="font-label text-label-md uppercase tracking-[0.1em] text-on-secondary-container mb-2 block">Batch
                    Review</span>
                <h1 class="font-headline font-extrabold text-4xl text-primary tracking-tight">Reviewing 3 of 12 Receipts
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="bg-surface-container-low text-on-secondary-container px-5 py-2.5 rounded-xl font-headline font-bold hover:bg-surface-container-high transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg" data-icon="chevron_left">chevron_left</span>
                    Previous
                </button>
                <div class="flex gap-1.5 px-4">
                    <div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-surface-container-highest"></div>
                </div>
                <button
                    class="bg-primary text-on-primary px-5 py-2.5 rounded-xl font-headline font-bold shadow-sm hover:opacity-90 transition-opacity flex items-center gap-2">
                    Next
                    <span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
                </button>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- Receipt Visual Preview (Asymmetric Layout) -->
            <div class="lg:col-span-5 sticky top-28">
                <div class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_12px_32px_-4px_rgba(0,77,100,0.08)]">
                    <div class="aspect-[3/4] relative rounded-lg overflow-hidden bg-surface-container-low">
                        <img alt="Receipt Preview" class="w-full h-full object-contain"
                            data-alt="Macro close-up of a printed thermal paper receipt with sharp text showing transaction details on a clean neutral background"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuea93NiASicYTrx98JBChJpOAt6QIXKNdJlFBZx_GPcRQY4VOc3Cg5Yh3RDjcen7orlb4fsYNfLMmKItvkOMZGt4MR4R5F4y_f0xWSRMM9bsn6q44B4KoCbwl9KJtVjjLmjKBHpYjBgJ_TmbZ1bbLIhFZn5pX7wlSwIBmiw7KoOhlzrOrSQENFyl3-wghpE1V4timL8qBs7SmmIfftU4OU44OEgtuwt2B__K5ev_iddyyd8iDvShj6yNjCIZDtnJIe1iEw7X3qLcY" />
                        <!-- Glassmorphism Zoom Badge -->
                        <div
                            class="absolute bottom-4 right-4 bg-white/80 backdrop-blur-xl px-4 py-2 rounded-full border border-outline-variant/15 flex items-center gap-2 shadow-sm">
                            <span class="material-symbols-outlined text-primary text-xl"
                                data-icon="zoom_in">zoom_in</span>
                            <span class="font-label text-sm font-medium text-primary">Tap to Enlarge</span>
                        </div>
                    </div>
                </div>
                <div class="mt-4 flex justify-center gap-4">
                    <button
                        class="text-error font-headline font-bold text-sm flex items-center gap-1.5 px-3 py-2 hover:bg-error-container/10 rounded-lg">
                        <span class="material-symbols-outlined text-lg" data-icon="delete">delete</span>
                        Discard Receipt
                    </button>
                    <button
                        class="text-primary font-headline font-bold text-sm flex items-center gap-1.5 px-3 py-2 hover:bg-primary-fixed/30 rounded-lg">
                        <span class="material-symbols-outlined text-lg" data-icon="rotate_right">rotate_right</span>
                        Rotate
                    </button>
                </div>
            </div>
            <!-- Form Content -->
            <div class="lg:col-span-7 space-y-8">
                <div class="bg-surface-container-low rounded-full p-8 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Vendor Name -->
                        <div class="flex flex-col gap-2">
                            <label class="font-label text-label-md font-semibold text-on-surface-variant ml-1">Vendor
                                Name</label>
                            <div class="relative">
                                <input
                                    class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface font-body focus:ring-2 focus:ring-primary shadow-sm transition-all"
                                    placeholder="Enter vendor" type="text" value="Blue Bottle Coffee" />
                                <span
                                    class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline"
                                    data-icon="store">store</span>
                            </div>
                        </div>
                        <!-- Amount -->
                        <div class="flex flex-col gap-2">
                            <label
                                class="font-label text-label-md font-semibold text-on-surface-variant ml-1">Amount</label>
                            <div class="relative">
                                <input
                                    class="w-full bg-surface-container-lowest border-none rounded-xl px-12 py-4 text-on-surface font-headline font-bold text-lg focus:ring-2 focus:ring-primary shadow-sm transition-all"
                                    type="text" value="12.50" />
                                <span
                                    class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">$</span>
                                <span
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant font-medium">USD</span>
                            </div>
                        </div>
                        <!-- Date Picker -->
                        <div class="flex flex-col gap-2">
                            <label
                                class="font-label text-label-md font-semibold text-on-surface-variant ml-1">Date</label>
                            <div class="relative">
                                <input
                                    class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface font-body focus:ring-2 focus:ring-primary shadow-sm transition-all"
                                    type="date" value="2023-10-24" />
                            </div>
                        </div>
                        <!-- Category -->
                        <div class="flex flex-col gap-2">
                            <label
                                class="font-label text-label-md font-semibold text-on-surface-variant ml-1">Category</label>
                            <div class="relative">
                                <select
                                    class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface font-body focus:ring-2 focus:ring-primary shadow-sm appearance-none transition-all">
                                    <option>Travel</option>
                                    <option selected="">Meals</option>
                                    <option>Supplies</option>
                                    <option>Office</option>
                                    <option>Entertainment</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none"
                                    data-icon="expand_more">expand_more</span>
                            </div>
                        </div>
                    </div>
                    <!-- Notes -->
                    <div class="flex flex-col gap-2">
                        <label class="font-label text-label-md font-semibold text-on-surface-variant ml-1">Notes
                            (Optional)</label>
                        <textarea
                            class="w-full bg-surface-container-lowest border-none rounded-xl px-4 py-4 text-on-surface font-body focus:ring-2 focus:ring-primary shadow-sm transition-all"
                            placeholder="Client meeting lunch..." rows="3"></textarea>
                    </div>
                    <div class="pt-6 border-t border-outline-variant/15 flex flex-col sm:flex-row items-center gap-4">
                        <button
                            class="w-full sm:w-auto bg-gradient-to-r from-primary to-primary-container text-on-primary px-10 py-4 rounded-xl font-headline font-extrabold text-lg flex items-center justify-center gap-3 shadow-lg active:scale-95 duration-150 transition-all">
                            Review Next
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
                        </button>
                        <button
                            class="w-full sm:w-auto bg-secondary-container text-on-secondary-container px-8 py-4 rounded-xl font-headline font-bold text-lg hover:bg-secondary-fixed-dim transition-colors">
                            Go to Export
                        </button>
                    </div>
                </div>
                <!-- Suggested Matches (Contextual Intelligence) -->
                <div class="bg-surface-container-lowest border border-outline-variant/15 rounded-xl p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-tertiary"
                            data-icon="auto_awesome">auto_awesome</span>
                        <h3 class="font-headline font-bold text-on-surface">Smart Suggestions</h3>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <button
                            class="bg-tertiary-fixed/30 text-on-tertiary-fixed-variant px-4 py-2 rounded-full font-label text-sm font-medium hover:bg-tertiary-fixed transition-colors">
                            Map to: Project Alpha
                        </button>
                        <button
                            class="bg-tertiary-fixed/30 text-on-tertiary-fixed-variant px-4 py-2 rounded-full font-label text-sm font-medium hover:bg-tertiary-fixed transition-colors">
                            Add Tax: 8.5%
                        </button>
                        <button
                            class="bg-tertiary-fixed/30 text-on-tertiary-fixed-variant px-4 py-2 rounded-full font-label text-sm font-medium hover:bg-tertiary-fixed transition-colors">
                            Reimbursable
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Bottom Progress Glass Bar (Batch Process Indicator) -->
    <div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-lg z-40">
        <div
            class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-outline-variant/20 rounded-full px-6 py-3 flex items-center gap-6 shadow-[0_12px_32px_-4px_rgba(0,77,100,0.12)]">
            <div class="flex-1">
                <div class="flex justify-between items-end mb-1.5">
                    <span class="font-label text-[10px] font-bold uppercase text-primary">Batch Completion</span>
                    <span class="font-headline text-xs font-extrabold text-primary">25%</span>
                </div>
                <div class="h-1.5 w-full bg-primary-fixed rounded-full overflow-hidden">
                    <div class="h-full bg-primary w-1/4 rounded-full"></div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-base" data-icon="sync">sync</span>
                </div>
                <span
                    class="font-label text-[11px] font-bold text-on-surface leading-tight">Processing<br />Remaining</span>
            </div>
        </div>
    </div>
    <!-- BottomNavBar -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-12px_32px_-4px_rgba(0,77,100,0.08)] border-t border-[#bfc8cd]/15 flex justify-around items-center px-4 pb-6 pt-3">
        <div
            class="flex flex-col items-center justify-center text-[#576670] dark:text-slate-400 px-4 py-1.5 transition-all duration-300 ease-in-out hover:text-[#004d64] dark:hover:text-[#bee9ff]">
            <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
            <span class="font-['Inter'] font-medium text-[11px] tracking-wide uppercase">Dashboard</span>
        </div>
        <div
            class="flex flex-col items-center justify-center bg-[#bee9ff] dark:bg-[#006684] text-[#004d64] dark:text-white rounded-xl px-4 py-1.5 transition-all duration-300 ease-in-out">
            <span class="material-symbols-outlined" data-icon="add_a_photo"
                style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
            <span class="font-['Inter'] font-medium text-[11px] tracking-wide uppercase">Capture</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-[#576670] dark:text-slate-400 px-4 py-1.5 transition-all duration-300 ease-in-out hover:text-[#004d64] dark:hover:text-[#bee9ff]">
            <span class="material-symbols-outlined" data-icon="history">history</span>
            <span class="font-['Inter'] font-medium text-[11px] tracking-wide uppercase">History</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-[#576670] dark:text-slate-400 px-4 py-1.5 transition-all duration-300 ease-in-out hover:text-[#004d64] dark:hover:text-[#bee9ff]">
            <span class="material-symbols-outlined" data-icon="settings">settings</span>
            <span class="font-['Inter'] font-medium text-[11px] tracking-wide uppercase">Settings</span>
        </div>
    </nav>
</body>

</html>
